openapi: 3.0.3
info:
  title: TreexPay API
  description: |
    API pública para integração com a TreexPay - Gateway de Pagamentos PIX.
    
    ## Autenticação
    Use sua API Key (sk_live_...) no header `X-API-Key` ou `Authorization: Bearer`.
    
    ## Fluxo de Pagamento PIX
    1. Crie um pagamento via `POST /payments`
    2. A API gera um PIX real automaticamente e retorna `pix_code` e `qr_code`
    3. O cliente paga via qualquer banco
    4. A TreexPay recebe confirmação da adquirente
    5. Seu webhook é notificado com `payment.paid`
    6. O saldo é creditado automaticamente
  version: 2.0.0
  contact:
    email: api@treexpay.site

servers:
  - url: https://fhwfonispezljglrclia.supabase.co/functions/v1/api-gateway
    description: Produção - TreexPay API Gateway

security:
  - apiKey: []

paths:
  /health:
    get:
      summary: Health check
      tags: [System]
      security: []
      responses:
        '200':
          description: Sistema operacional
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: TreexPay API Gateway
                  version:
                    type: string
                    example: "2.0.0"
                  features:
                    type: array
                    items:
                      type: string
                    example: ["pix"]
                  timestamp:
                    type: string
                    format: date-time

  /payments:
    post:
      summary: Criar pagamento PIX
      description: |
        Cria um pagamento e gera automaticamente uma cobrança PIX real via adquirente.
        A resposta inclui o código copia-e-cola (`pix_code`) e o QR Code (`qr_code`).
        
        O valor é em reais (ex: 10.00 = R$ 10,00). Máximo: R$ 100.000,00.
      tags: [Payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
      responses:
        '201':
          description: Pagamento criado com PIX gerado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentWithPix'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '502':
          description: Falha ao gerar PIX na adquirente
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Failed to generate PIX payment
                  payment_id:
                    type: string
                  details:
                    type: string

    get:
      summary: Listar pagamentos
      tags: [Payments]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, paid, canceled, expired, failed]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Lista de pagamentos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PaymentWithPix'
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer

  /payments/{id}:
    get:
      summary: Consultar pagamento
      tags: [Payments]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Detalhes do pagamento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentWithPix'
        '404':
          $ref: '#/components/responses/NotFound'

  /payments/{id}/status:
    patch:
      summary: Atualizar status do pagamento (manual)
      description: |
        Permite alterar manualmente o status de um pagamento.
        Normalmente o status é atualizado automaticamente via webhook da adquirente.
      tags: [Payments]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [pending, paid, canceled, expired, failed]
      responses:
        '200':
          description: Status atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentWithPix'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: Chave secreta (sk_live_...) gerada no dashboard

  schemas:
    CreatePaymentRequest:
      type: object
      required:
        - amount
      properties:
        amount:
          type: number
          description: Valor em reais (ex 10.50 = R$ 10,50)
          example: 10.00
          minimum: 0.01
          maximum: 100000
        description:
          type: string
          description: Descrição do pagamento
          example: "Assinatura mensal"
        customer_email:
          type: string
          format: email
          example: "cliente@example.com"
        webhook_url:
          type: string
          format: uri
          description: URL para receber notificação quando este pagamento for confirmado
          example: "https://seusite.com/webhook/pagamento"
        metadata:
          type: object
          additionalProperties: true
          description: Dados adicionais (máx 10 campos)
          example:
            order_id: "PED-12345"

    PaymentWithPix:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID interno do pagamento
        external_id:
          type: string
          description: ID da transação na adquirente
        amount:
          type: number
          description: Valor em reais
        status:
          type: string
          enum: [pending, paid, canceled, expired, failed]
        description:
          type: string
        customer_email:
          type: string
        pix_code:
          type: string
          description: Código copia-e-cola do PIX (BR Code)
          example: "00020101021226800014br.gov.bcb.pix..."
        qr_code:
          type: string
          description: Dados do QR Code PIX
          example: "00020101021226800014br.gov.bcb.pix..."
        expires_at:
          type: string
          format: date-time
          description: Data de expiração do PIX
        provider:
          type: string
          description: Adquirente utilizada
          example: novaera
        webhook_sent:
          type: boolean
        paid_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WebhookPayload:
      type: object
      description: Payload enviado para seu webhook quando um pagamento é confirmado
      properties:
        event:
          type: string
          example: payment.paid
        payment:
          type: object
          properties:
            id:
              type: string
              format: uuid
            amount:
              type: number
            status:
              type: string
              example: paid
            paid_at:
              type: string
              format: date-time

    Error:
      type: object
      properties:
        error:
          type: string

  responses:
    BadRequest:
      description: Requisição inválida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "amount is required and must be a positive number"

    Unauthorized:
      description: Não autenticado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Missing or invalid API key"

    Forbidden:
      description: Chave inativa ou inválida
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Invalid or inactive API key"

    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Payment not found"
